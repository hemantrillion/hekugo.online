<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeKuGo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
      <style>
         *{margin:0;padding:0;box-sizing:border-box;}
          html,body{width:100%;height:100%;overflow:hidden;background:#000;}
          video{position:fixed;top:50%;left:50%;min-width:100%;min-height:100%;transform:translate(-50%,-50%);object-fit:cover;}
          #brand{position:fixed;top:30px;left:34px;font-family:Arial,sans-serif;font-size:17px;font-weight:300;letter-spacing:0.28em;color:rgba(255,255,255,0.88);z-index:10;text-transform:uppercase;}
          video{pointer-events:none;}
      </style>
</head>


 
<body>
     <audio autoplay loop>
          <source src="sound1 bud.mp3" type="audio/mp3">
     </audio>
  
     <video autoplay muted loop playsinline>
          <source src="andr loop.mp4" type="video/mp4" media="(max-width: 768px)">
          <source src="reel go.mp4" type="video/mp4">
     </video>
     
  <div id="brand">Hekugo</div>
  
    <script>
       document.addEventListener('contextmenu',e=>e.preventDefault());
    </script>
    
    <script>
        const audio = document.querySelector('audio');
        document.addEventListener('click', () => audio.play(), {once: true});
    </script>
</body>
 
</html>
